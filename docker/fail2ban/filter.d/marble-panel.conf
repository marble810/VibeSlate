# Fail2Ban filter for Marble Panel auth failures.
#
# Matches lines like:
#   MARBLE_AUTH_FAIL ip=10.0.1.5 path=/auth/login reason=bad_password
#
# These lines are produced by the Bun app's auth module.
# In production, they appear in:
#   - Docker json-file logs (docker compose logs app)
#   - /var/log/marble-panel/auth.log (file-based, mounted volume)
#
# Both sources are valid; choose one for the jail's logpath.

[Definition]

# Match the auth failure line. The <ADDR> placeholder captures the client IP.
failregex = ^MARBLE_AUTH_FAIL ip=<ADDR> path=/auth/login reason=bad_password$

ignoreregex =

# For systemd-journal based setups:
# journalmatch = _SYSTEMD_UNIT=marble-panel.service
