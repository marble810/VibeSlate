# Fail2Ban jail for Marble Panel — Docker container deployment.
#
# Reads auth failure logs from /var/log/marble-panel/auth.log
# and writes banned IPs to a shared volume file that the Bun app
# checks on each request.
#
# Defaults:
#   5 failures in 10 minutes → 10-minute ban
#
# For host-level Fail2Ban (not the container path), replace
#   logpath  with your Docker json-file log location and
#   action   with iptables-allports[blocktype=DROP].

[marble-panel]

enabled  = true
port     = http,https
filter   = marble-panel

# Auth log file — mounted from the app container via shared volume.
# In the container, Fail2Ban reads this file directly.
logpath  = /var/log/marble-panel/auth.log

maxretry = 5
findtime = 600
bantime  = 600

# Docker-compatible action: writes banned IPs to a shared file
# that the Bun app checks on each request.
action   = marble-panel-docker
