# Fail2Ban action for Docker-based deployments.
#
# Writes banned/unbanned IPs to a shared file that the Bun app checks
# on each request. This provides real traffic blocking without host-level
# iptables access.
#
# The shared file path must be on a volume mounted in both the fail2ban
# and app containers.
#
# Usage in jail.d/marble-panel.conf:
#   action = marble-panel-docker

[Definition]

actionstart = touch /var/lib/fail2ban/marble-panel-banned.txt

actionstop  = rm -f /var/lib/fail2ban/marble-panel-banned.txt

actionban   = echo "<ip>" >> /var/lib/fail2ban/marble-panel-banned.txt

actionunban = sed -i '/^<ip>$/d' /var/lib/fail2ban/marble-panel-banned.txt

[Init]

# Nothing
