name: vibeslate

# Copy this file to docker/docker-compose.yml.
# Copy docker/.env.example to docker/.env and edit that file for all provider/auth/TLS settings.
# Main path:
#   1. cp docker/docker-compose.example.yml docker/docker-compose.yml
#   2. cp docker/.env.example docker/.env
#   3. ./docker/GetCodexAuthInfo.sh
#   4. docker compose -f docker/docker-compose.yml up -d app

services:
  app:
    image: ghcr.io/marble810/vibeslate:v0.1.0-alpha.1
    container_name: vibeslate
    env_file:
      - ./.env
    ports:
      - "12001:12001"
    volumes:
      - ../data/docker/state:/app/data/state
      - ../data/docker/certs:/app/data/certs
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
