# Docker Compose — Marble Panel
#
# Single-container deployment. All config lives here — no external config files.
#
# Start:  bun run docker:up
# Verify: bun run docker:smoke

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "12001:12001"
    environment:
      - HOST=0.0.0.0
      - PORT=12001

      # ── Provider Tokens ──
      # DeepSeek: browser → platform.deepseek.com → F12 → Authorization header
      - DEEPSEEK_PLATFORM_TOKEN=
      # OpenAI: ~/.codex/auth.json → tokens.refresh_token / tokens.account_id
      - OPENAI_REFRESH_TOKEN=
      - OPENAI_ACCOUNT_ID=

      # ── Password Auth (optional) ──
      # Generate hash: bun -e 'console.log(await Bun.password.hash("your-password"))'
      - AUTH_ENABLED=false
      - AUTH_PASSWORD_HASH=
      - AUTH_COOKIE_SECURE=true

      # ── UI ──
      - UI_CUSTOM_ACCENT=#8b5cf6

      # ── Token Persistence ──
      - OPENAI_TOKEN_STATE_FILE=/app/data/state/openai-token.json

      # ── TLS (optional) ──
      # Provide cert.pem + key.pem via volume mount and uncomment:
      # - TLS_CERT_FILE=/app/certs/cert.pem
      # - TLS_KEY_FILE=/app/certs/key.pem
    volumes:
      # Runtime state (token persistence, survives restarts)
      - ../data/docker/state:/app/data/state
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
