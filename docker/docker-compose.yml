# Docker Compose — Marble Panel Unified Deployment
#
# A single compose file for both LAN and Public modes.
# Start with: bun run docker:up (reads data/docker/mode)
#
# Profiles:
#   <default>   — App only (LAN mode)
#   public      — App + Caddy + Fail2Ban (Public mode)
#
# LAN mode adds host port mapping via docker-compose.lan.yml override.

services:
  # ═══════════════════════════════════════════════════════
  # Bun App — runs in both LAN and Public modes
  # ═══════════════════════════════════════════════════════
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MARBLE_HIDDEN_ENTRY_PATH: ${MARBLE_HIDDEN_ENTRY_PATH:-}
    # In Public mode: only expose, no host ports (Caddy is the sole entry).
    # In LAN mode: host port mapping added by docker-compose.lan.yml override.
    expose:
      - "12001"
    environment:
      - MARBLE_CONFIG_FILE=${MARBLE_CONFIG_FILE:-/app/data/server.config.json}
      - MARBLE_AUTH_ENABLED=${MARBLE_AUTH_ENABLED:-false}
      - MARBLE_AUTH_COOKIE_SECURE=${MARBLE_AUTH_COOKIE_SECURE:-true}
      - MARBLE_PUBLIC_TRUSTED_PROXIES=${MARBLE_PUBLIC_TRUSTED_PROXIES:-}
      - MARBLE_HIDDEN_ENTRY_PATH=${MARBLE_HIDDEN_ENTRY_PATH:-}
      - TLS_CERT_FILE=${TLS_CERT_FILE:-}
      - TLS_KEY_FILE=${TLS_KEY_FILE:-}
      - HOST=0.0.0.0
      - PORT=12001
    volumes:
      # Server config (generated by docker:init)
      - ../data/docker/server.config.json:/app/data/server.config.json:ro
      # TLS certs (LAN mode, generated by docker:init or lan:https)
      - ../data/docker/certs:/app/data/certs:ro
      # Auth logs (shared with Fail2Ban in Public mode)
      - marble-logs:/var/log/marble-panel
      # Fail2Ban ban list (shared, read-only by app in Public mode)
      - fail2ban-data:/var/lib/fail2ban:ro
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═══════════════════════════════════════════════════════
  # Caddy — Public mode only
  # ═══════════════════════════════════════════════════════
  caddy:
    image: caddy:2-alpine
    profiles: ["public"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Domain-specific Caddyfile (generated by docker:init)
      - ../data/docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
      - caddy-logs:/var/log/caddy
    restart: unless-stopped
    depends_on:
      - app

  # ═══════════════════════════════════════════════════════
  # Fail2Ban — Public mode only
  # ═══════════════════════════════════════════════════════
  fail2ban:
    build:
      context: ./fail2ban
      dockerfile: Dockerfile
    profiles: ["public"]
    volumes:
      - ./fail2ban/jail.d:/etc/fail2ban/jail.d:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - ./fail2ban/action.d:/etc/fail2ban/action.d:ro
      - marble-logs:/var/log/marble-panel:ro
      - caddy-logs:/var/log/caddy:ro
      - fail2ban-data:/var/lib/fail2ban
    restart: unless-stopped
    depends_on:
      - app

volumes:
  marble-logs:
  caddy-data:
  caddy-config:
  caddy-logs:
  fail2ban-data:
