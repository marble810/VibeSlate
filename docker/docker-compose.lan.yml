# Docker Compose override — LAN Mode
#
# Adds host port mapping so LAN devices can reach the app directly.
# Automatically merged by: docker compose -f docker-compose.yml -f docker-compose.lan.yml
#
# Do NOT use this file for Public mode — Caddy is the sole entry point there.

services:
  app:
    ports:
      - "${MARBLE_APP_PORT:-12001}:12001"
