<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Marble Panel — AI Provider Usage & System Dashboard" />
    <title>Marble Panel</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" type="image/png" href="/icons/icon-180.png" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-title" content="Marble Panel" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('marble-panel:theme');
          if (theme !== 'marble-purple' && theme !== 'custom-accent' && theme !== 'eink') return;

          document.documentElement.dataset.theme = theme;
          const metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', theme === 'eink' ? '#ffffff' : '#000000');
          }
        } catch {
          // Keep the default theme when storage is unavailable.
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
